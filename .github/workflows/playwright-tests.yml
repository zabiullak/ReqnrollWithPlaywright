name: Playwright Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:        # allows manual trigger from the GitHub UI

# Required so the workflow can push the Allure report to gh-pages
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore ReqnrollWithPlaywright/ReqnrollWithPlaywright.csproj

      - name: Build
        run: dotnet build ReqnrollWithPlaywright/ReqnrollWithPlaywright.csproj --configuration Debug --no-restore

      # The Playwright script is generated into the build output folder after build
      - name: Install Playwright browsers
        run: pwsh ReqnrollWithPlaywright/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run tests (retry up to 3 times on failure)
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "▶ Test attempt $attempt of $max_attempts"
            if dotnet test ReqnrollWithPlaywright/ReqnrollWithPlaywright.csproj \
                 --configuration Debug --no-build \
                 --settings ReqnrollWithPlaywright/Settings.runsettings; then
              echo "✅ Tests passed on attempt $attempt"
              break
            fi
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Tests failed after $max_attempts attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed — retrying..."
            attempt=$((attempt + 1))
          done

      # ── Artifacts (always upload so failures are still visible) ──────────────

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ReqnrollWithPlaywright/bin/Debug/net10.0/allure-results
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Screenshots
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: Traces
          if-no-files-found: ignore
          retention-days: 14

      # ── Allure HTML report ────────────────────────────────────────────────────

      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --silent
          allure generate ReqnrollWithPlaywright/bin/Debug/net10.0/allure-results --clean -o allure-report

      - name: Upload Allure HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      # Publishes the report to https://<your-github-username>.github.io/<repo-name>/
      # Only runs on push to master — PRs do not have write access to gh-pages
      - name: Publish Allure report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          commit_message: "docs: allure report for run #${{ github.run_number }}"
