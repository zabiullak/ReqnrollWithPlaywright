name: Playwright Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:        # allows manual trigger from the GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # .NET 10 is currently in preview — remove dotnet-quality once it goes GA
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore ReqnrollWithPlaywright/ReqnrollWithPlaywright.csproj

      - name: Build
        run: dotnet build ReqnrollWithPlaywright/ReqnrollWithPlaywright.csproj --configuration Debug --no-restore

      # The Playwright script is generated into the build output folder after build
      - name: Install Playwright browsers
        run: pwsh ReqnrollWithPlaywright/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run tests
        run: dotnet test ReqnrollWithPlaywright/ReqnrollWithPlaywright.csproj --configuration Debug --no-build --settings ReqnrollWithPlaywright/Settings.runsettings

      # ── Artifacts (always upload so failures are still visible) ──────────────

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ReqnrollWithPlaywright/bin/Debug/net10.0/allure-results
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Screenshots
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: Traces
          if-no-files-found: ignore
          retention-days: 14

      # ── Allure HTML report ────────────────────────────────────────────────────

      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --silent
          allure generate ReqnrollWithPlaywright/bin/Debug/net10.0/allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14
